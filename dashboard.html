<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - ESSA Nyarugunga</title>
    <link rel="stylesheet" href="style.css">
       <link rel="icon" type="image" href="images/favicon.ico">
    <link rel="stylesheet" href="features.css">
    <style>
        .login-container {
            max-width: 420px;
            margin: 100px auto;
            background: var(--bg-card);
            padding: 50px 40px;
            border-radius: 16px;
            box-shadow: var(--shadow);
            text-align: center;
        }

        .login-container h2 {
            margin-bottom: 30px;
            color: var(--text-primary);
        }

        .dashboard-container {
            max-width: 1350px;
            margin: 30px auto;
            padding: 20px;
            display: none; /* Hidden until login */
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .tab-btn {
            padding: 12px 24px;
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .table-container {
            background: var(--bg-card);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: var(--shadow);
        }

        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 16px 18px; text-align: left; }
        th { background: var(--accent); color: white; }

        .action-btn {
            padding: 7px 14px;
            margin: 3px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        .accept-btn { background: #27ae60; color: white; }
        .delete-btn { background: #e74c3c; color: white; }

        .class-filter {
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: 8px;
            margin-bottom: 20px;
            width: 100%;
            max-width: 350px;
        }
    </style>
</head>
<body>

    <!-- LOGIN FORM -->
    <div id="loginScreen" class="login-container">
        <h2>Admin Login</h2>
        <form id="adminLoginForm">
            <div class="form-group" style="margin-bottom: 20px;">
                <label for="adminUsername">Username</label><br>
                <input type="text" id="adminUsername" required style="width: 100%; padding: 12px; border-radius: 8px; border: 2px solid var(--border);">
            </div>
            
            <div class="form-group" style="margin-bottom: 30px;">
                <label for="adminPassword">Password</label><br>
                <input type="password" id="adminPassword" required style="width: 100%; padding: 12px; border-radius: 8px; border: 2px solid var(--border);">
            </div>

            <button type="submit" class="btn-primary" style="width: 100%; padding: 14px;">
                Login As Admin
            </button>
        </form>
        <p style="margin-top: 20px; color: var(--text-secondary);">
            Default: <strong>If you are not an Adminstraor Don't Try</strong>
        </p>
    </div>

    <!-- DASHBOARD (Hidden until successful login) -->
    <div id="dashboardScreen" class="dashboard-container">

        <!-- HEADER -->
        <header>
            <div class="container" style="display: flex; justify-content: space-between; align-items: center; padding: 15px 30px;">
                <div class="logo-area">
                    <img src="images/Essalogo.png" alt="ESSA Logo" class="logo" style="height: 50px;">
                    <h1 style="font-size: 24px; margin: 0;">ESSA Nyarugunga</h1>
                </div>
                <button onclick="logout()" style="background:#e07a5f; color:white; border:none; padding:10px 24px; border-radius:50px; cursor:pointer;">Logout</button>
            </div>
        </header>

        <div class="dashboard-header">
            <div>
                <h2>Wellcome back</h2>
                <h1 class="welcome" id="adminName">Administrator</h1>
            </div>
        </div>

        <!-- TABS -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab(0)">New Applications</button>
            <button class="tab-btn" onclick="switchTab(1)">Accepted Students</button>
            <button class="tab-btn" onclick="switchTab(2)">Signed Up Users</button>
        </div>

        <!-- Tab 0: New Applications -->
        <div id="tab0">
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Student Name</th>
                            <th>Class / Trade</th>
                            <th>Parent Contact</th>
                            <th>Date Applied</th>
                            <th>Receipt</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="applicationsBody"></tbody>
                </table>
            </div>
        </div>

        <!-- Tab 1: Accepted Students -->
        <div id="tab1" style="display: none;">
            <select id="classFilter" class="class-filter" onchange="filterAcceptedStudents()">
                <option value="">All Classes</option>
            </select>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Student Name</th>
                            <th>Class / Trade</th>
                            <th>Parent Contact</th>
                            <th>Date Accepted</th>
                        </tr>
                    </thead>
                    <tbody id="acceptedBody"></tbody>
                </table>
            </div>
        </div>

        <!-- Tab 2: Signed Up Users -->
        <div id="tab2" style="display: none;">
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Username</th>
                            <th>Date Registered</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="usersBody"></tbody>
                </table>
            </div>
        </div>
    </div>
    
    <script>
        // Admin Credentials
        const ADMIN_USERNAME = "James250Essa";
        const ADMIN_PASSWORD = "essa200pro";

        // Login Form Handler
        document.getElementById('adminLoginForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const username = document.getElementById('adminUsername').value.trim();
            const password = document.getElementById('adminPassword').value.trim();

            if (username === ADMIN_USERNAME && password === ADMIN_PASSWORD) {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('dashboardScreen').style.display = 'block';
                initDashboard();
            } else {
                alert("Incorrect username or password!");
            }
        });

        // Initialize Dashboard after successful login
        function initDashboard() {
            loadApplications();
            loadUsers();
            switchTab(0);
        }

        function logout() {
            if (confirm("Are you sure you want to logout?")) {
                document.getElementById('dashboardScreen').style.display = 'none';
                document.getElementById('loginScreen').style.display = 'block';
                document.getElementById('adminLoginForm').reset();
                window.location.href="index.html"
            }
        }

        // Tab Switching
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach((btn, i) => {
                btn.classList.toggle('active', i === tab);
            });

            document.getElementById('tab0').style.display = tab === 0 ? 'block' : 'none';
            document.getElementById('tab1').style.display = tab === 1 ? 'block' : 'none';
            document.getElementById('tab2').style.display = tab === 2 ? 'block' : 'none';

            if (tab === 1) loadAcceptedStudents();
        }

        // Load New Applications
        function loadApplications() {
            let applications = JSON.parse(localStorage.getItem('essaApplications')) || [];
            const tbody = document.getElementById('applicationsBody');
            tbody.innerHTML = '';

            if (applications.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" class="no-data">No new applications pending.</td></tr>`;
                return;
            }

            applications.forEach((app, index) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${index + 1}</td>
                    <td><strong>${app.studentName}</strong></td>
                    <td>${app.studentClass}</td>
                    <td>${app.parentNumber}</td>
                    <td>${app.dateApplied}</td>
                    <td>${app.receiptNumber || '—'}</td>
                    <td>
                        <button class="action-btn accept-btn" onclick="acceptApplication(${app.id})">Accept</button>
                        <button class="action-btn delete-btn" onclick="deleteApplication(${app.id})">Delete</button>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        // Accept Application
        function acceptApplication(id) {
            let applications = JSON.parse(localStorage.getItem('essaApplications')) || [];
            let accepted = JSON.parse(localStorage.getItem('acceptedStudents')) || [];

            const index = applications.findIndex(a => a.id === id);
            if (index === -1) return;

            const acceptedApp = {
                ...applications[index],
                dateAccepted: new Date().toLocaleDateString('en-GB'),
                status: "Accepted"
            };

            accepted.push(acceptedApp);
            applications.splice(index, 1);

            localStorage.setItem('essaApplications', JSON.stringify(applications));
            localStorage.setItem('acceptedStudents', JSON.stringify(accepted));

            alert("Student accepted successfully!");
            loadApplications();
            loadAcceptedStudents();
        }

        // Delete Application
        function deleteApplication(id) {
            if (!confirm("Delete this application?")) return;
            let applications = JSON.parse(localStorage.getItem('essaApplications')) || [];
            applications = applications.filter(a => a.id !== id);
            localStorage.setItem('essaApplications', JSON.stringify(applications));
            loadApplications();
        }

        // Load Accepted Students
        function loadAcceptedStudents() {
            let accepted = JSON.parse(localStorage.getItem('acceptedStudents')) || [];
            const tbody = document.getElementById('acceptedBody');
            tbody.innerHTML = '';

            const classFilter = document.getElementById('classFilter');
            classFilter.innerHTML = '<option value="">All Classes</option>';

            const uniqueClasses = [...new Set(accepted.map(s => s.studentClass))];
            uniqueClasses.forEach(cls => {
                const opt = document.createElement('option');
                opt.value = cls;
                opt.textContent = cls;
                classFilter.appendChild(opt);
            });

            if (accepted.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="no-data">No accepted students yet.</td></tr>`;
                return;
            }

            accepted.forEach((student, index) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${index + 1}</td>
                    <td><strong>${student.studentName}</strong></td>
                    <td>${student.studentClass}</td>
                    <td>${student.parentNumber}</td>
                    <td>${student.dateAccepted}</td>
                `;
                tbody.appendChild(row);
            });
        }

        function filterAcceptedStudents() {
            const selected = document.getElementById('classFilter').value;
            let accepted = JSON.parse(localStorage.getItem('acceptedStudents')) || [];
            const tbody = document.getElementById('acceptedBody');
            tbody.innerHTML = '';

            const filtered = selected ? accepted.filter(s => s.studentClass === selected) : accepted;

            if (filtered.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="no-data">No students found.</td></tr>`;
                return;
            }

            filtered.forEach((student, index) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${index + 1}</td>
                    <td><strong>${student.studentName}</strong></td>
                    <td>${student.studentClass}</td>
                    <td>${student.parentNumber}</td>
                    <td>${student.dateAccepted}</td>
                `;
                tbody.appendChild(row);
            });
        }

        // Load Signed Up Users
        function loadUsers() {
            const users = JSON.parse(localStorage.getItem('users')) || [];
            const tbody = document.getElementById('usersBody');
            tbody.innerHTML = '';

            if (users.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="no-data">No registered users yet.</td></tr>`;
                return;
            }

            users.forEach((user, index) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${index + 1}</td>
                    <td><strong>${user.username}</strong></td>
                    <td>${user.date || 'N/A'}</td>
                    <td><button class="delete-btn action-btn" onclick="deleteUser('${user.username}')">Delete</button></td>
                `;
                tbody.appendChild(row);
            });
        }
        
        function editStudent(id) {
            let accepted = JSON.parse(localStorage.getItem('acceptedStudents')) || [];
            const student = accepted.find(s => s.id === id);
            if (!student) return;

            currentEditId = id;
            document.getElementById('editId').value = id;
            document.getElementById('editName').value = student.studentName;
            document.getElementById('editClass').value = student.studentClass;
            document.getElementById('editParent').value = student.parentNumber;

            document.getElementById('editModal').style.display = 'flex';
        }

        document.getElementById('editForm').addEventListener('submit', function(e) {
            e.preventDefault();

            let accepted = JSON.parse(localStorage.getItem('acceptedStudents')) || [];
            const index = accepted.findIndex(s => s.id === currentEditId);

            if (index !== -1) {
                accepted[index].studentName = document.getElementById('editName').value;
                accepted[index].studentClass = document.getElementById('editClass').value;
                accepted[index].parentNumber = document.getElementById('editParent').value;

                localStorage.setItem('acceptedStudents', JSON.stringify(accepted));
                alert("Student information updated successfully!");
                closeModal();
                loadAcceptedStudents();
            }
        });
        
        document.getElementById('editForm').addEventListener('submit', function(e) {
            e.preventDefault();

            let accepted = JSON.parse(localStorage.getItem('acceptedStudents')) || [];
            const index = accepted.findIndex(s => s.id === currentEditId);

            if (index !== -1) {
                accepted[index].studentName = document.getElementById('editName').value;
                accepted[index].studentClass = document.getElementById('editClass').value;
                accepted[index].parentNumber = document.getElementById('editParent').value;

                localStorage.setItem('acceptedStudents', JSON.stringify(accepted));
                alert("Student information updated successfully!");
                closeModal();
                loadAcceptedStudents();
            }
        });


        function deleteAcceptedStudent(id) {
            if (!confirm("Delete this student permanently?")) return;

            let accepted = JSON.parse(localStorage.getItem('acceptedStudents')) || [];
            accepted = accepted.filter(s => s.id !== id);
            localStorage.setItem('acceptedStudents', JSON.stringify(accepted));
            loadAcceptedStudents();
        }

        function closeModal() {
            document.getElementById('editModal').style.display = 'none';
        }

        // Initialize
        function initDashboard() {
            loadApplications();
            loadUsers();
            switchTab(0);
        }
        

        function deleteUser(username) {
            if (!confirm(`Delete user ${username}?`)) return;
            let users = JSON.parse(localStorage.getItem('users')) || [];
            users = users.filter(u => u.username !== username);
            localStorage.setItem('users', JSON.stringify(users));
            loadUsers();
        }
    </script>
    <script>

            overflow-x: auto;

        /* Edit Modal */
        .modal {
            display: none;

            z-index: 200;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: var(--bg-card);

<body>

    <!-- LOGIN SCREEN -->
    <div id="loginScreen" class="login-container">
        <h2>Admin Login</h2>
        <form id="adminLoginForm">
            <div class="form-group" style="margin-bottom: 20px;">
                <label>Username</label><br>

    <!-- DASHBOARD -->
    <div id="dashboardScreen" class="dashboard-container">

        <header>
            <div class="header-content">

                    <h1 style="font-size: 24px; margin: 0;">ESSA Nyarugunga</h1>
                </div>

                <nav class="desktop-nav">
                    <a href="#" onclick="switchTab(0)">Applications</a>
                    <a href="#" onclick="switchTab(1)">Accepted</a>
                    <a href="#" onclick="switchTab(2)">Users</a>
                </nav>

                <button class="hamburger" id="hamburger">☰</button>

            </div>

            <!-- Mobile Menu -->
            <div class="mobile-menu" id="mobileMenu">
                <a href="#" onclick="switchTab(0);closeMobileMenu()">New Applications</a>
                <a href="#" onclick="switchTab(1);closeMobileMenu()">Accepted Students</a>
                <a href="#" onclick="switchTab(2);closeMobileMenu()">Signed Up Users</a>
            </div>
        </header>

        <div style="padding: 20px;">
            <h1>Welcome back, <span id="adminName">Administrator</span></h1>

            <!-- TABS -->
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab(0)">New Applications</button>
                <button class="tab-btn" onclick="switchTab(1)">Accepted Students</button>
                <button class="tab-btn" onclick="switchTab(2)">Signed Up Users</button>
            </div>

            <!-- Tab Contents -->
            <div id="tab0"> <!-- New Applications --> ... (same as before) </div>
            <div id="tab1" style="display:none;">
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Student Name</th>

                            </tr>
                        </thead>
                        <tbody id="acceptedBody"></tbody>
                    </table>
                </div>
            </div>
            <div id="tab2" style="display:none;"> <!-- Users Tab --> ... </div>
        </div>
    </div>

    <!-- EDIT MODAL -->
    <div id="editModal" class="modal">

            <h2>Edit Student Information</h2>

                <input type="hidden" id="editId">

                <label>Student Name</label>
                <input type="text" id="editName" required style="width:100%; padding:10px; margin:8px 0;">

                <label>Class / Trade</label>
                <input type="text" id="editClass" required style="width:100%; padding:10px; margin:8px 0;">

                <label>Parent Contact</label>
                <input type="text" id="editParent" required style="width:100%; padding:10px; margin:8px 0;">

                <div style="margin-top:20px;">
                    <button type="button" onclick="closeModal()" style="margin-right:10px;">Cancel</button>

    <script>
        // Admin Credentials
        const ADMIN_USERNAME = "James250Essa";
        const ADMIN_PASSWORD = "essa200pro";

        // Login
        document.getElementById('adminLoginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const user = document.getElementById('adminUsername').value.trim();
            const pass = document.getElementById('adminPassword').value.trim();

            if (user === ADMIN_USERNAME && pass === ADMIN_PASSWORD) {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('dashboardScreen').style.display = 'block';
                initDashboard();
            } else {
                alert("Incorrect credentials!");
            }
        });

        function logout() {
            if (confirm("Logout?")) {
                document.getElementById('dashboardScreen').style.display = 'none';
                document.getElementById('loginScreen').style.display = 'block';
                document.getElementById('adminLoginForm').reset();
            }
        }

        // Hamburger Menu
        const hamburger = document.getElementById('hamburger');
        const mobileMenu = document.getElementById('mobileMenu');

        hamburger.addEventListener('click', () => {
            mobileMenu.classList.toggle('active');
            hamburger.textContent = mobileMenu.classList.contains('active') ? '✕' : '☰';
        });

        function closeMobileMenu() {
            mobileMenu.classList.remove('active');
            hamburger.textContent = '☰';
        }

        // Tab Switching
        function switchTab(n) {
            document.querySelectorAll('.tab-btn').forEach((btn, i) => btn.classList.toggle('active', i === n));
            document.getElementById('tab0').style.display = n === 0 ? 'block' : 'none';
            document.getElementById('tab1').style.display = n === 1 ? 'block' : 'none';
            document.getElementById('tab2').style.display = n === 2 ? 'block' : 'none';

            if (n === 1) loadAcceptedStudents();
        }

        // ================== EDIT & DELETE FOR ACCEPTED STUDENTS ==================
        let currentEditId = null;
        function loadAcceptedStudents() {
            let accepted = JSON.parse(localStorage.getItem('acceptedStudents')) || [];
            const tbody = document.getElementById('acceptedBody');
            tbody.innerHTML = '';

            if (accepted.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6">No accepted students yet.</td></tr>`;
                return;
            }

            accepted.forEach((student, index) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${index + 1}</td>
                    <td><strong>${student.studentName}</strong></td>
                    <td>${student.studentClass}</td>
                    <td>${student.parentNumber}</td>
                    <td>${student.dateAccepted}</td>
                    <td>
                        <button class="action-btn edit-btn" onclick="editStudent(${student.id})">Edit</button>
                        <button class="action-btn delete-btn" onclick="deleteAcceptedStudent(${student.id})">Delete</button>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        function editStudent(id) {
            let accepted = JSON.parse(localStorage.getItem('acceptedStudents')) || [];
            const student = accepted.find(s => s.id === id);
            if (!student) return;

            currentEditId = id;
            document.getElementById('editId').value = id;
            document.getElementById('editName').value = student.studentName;
            document.getElementById('editClass').value = student.studentClass;
            document.getElementById('editParent').value = student.parentNumber;

            document.getElementById('editModal').style.display = 'flex';
        }

        document.getElementById('editForm').addEventListener('submit', function(e) {
            e.preventDefault();

            let accepted = JSON.parse(localStorage.getItem('acceptedStudents')) || [];
            const index = accepted.findIndex(s => s.id === currentEditId);

            if (index !== -1) {
                accepted[index].studentName = document.getElementById('editName').value;
                accepted[index].studentClass = document.getElementById('editClass').value;
                accepted[index].parentNumber = document.getElementById('editParent').value;

                localStorage.setItem('acceptedStudents', JSON.stringify(accepted));
                alert("Student information updated successfully!");
                closeModal();
                loadAcceptedStudents();
            }
        });

        function deleteAcceptedStudent(id) {
            if (!confirm("Delete this student permanently?")) return;

            let accepted = JSON.parse(localStorage.getItem('acceptedStudents')) || [];
            accepted = accepted.filter(s => s.id !== id);
            localStorage.setItem('acceptedStudents', JSON.stringify(accepted));
            loadAcceptedStudents();
        }

        function closeModal() {
            document.getElementById('editModal').style.display = 'none';
        }

        // Initialize
        function initDashboard() {
            loadApplications();
            loadUsers();
            switchTab(0);
        }
        

        // Keep your existing functions (loadApplications, acceptApplication, etc.)
        // ... (paste all your previous script functions here)

    </script>
</body>
