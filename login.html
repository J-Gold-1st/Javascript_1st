<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Essa Today</title>
    
    <style>
        .welcome {
            animation: mymove 5s linear infinite;
            display: inline-block; /* Important for width animation */
        }

        @keyframes mymove {
            0% {
                width: 0px;
            }
            50% {
                width: 100%;
            }
            100% {
                width: 0px;
            }
        }

        /* Optional: Center the text and improve looks */
        h2 {
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
        }
    </style>

    <link rel="stylesheet" href="slogin.css">
</head>
<body>

    <section>
        <form id="loginForm">
            <h2 class="welcome">Welcome Back to Essa Today</h2>
            
            <label for="username">Username:</label><br>
            <input type="text" id="username" name="username" required><br><br>
            
            <label for="password">Password:</label><br>
            <input type="password" id="password" name="password" required><br><br>
            
            <button type="submit">Log in</button>
        </form>

        <p>If you don't have an account, <a href="signup.html">Sign up here</a></p>
    </section>

 <script>
    document.getElementById('loginForm').addEventListener('submit', function(event) {
        event.preventDefault();

        const username = document.getElementById('  username').value.trim();
        const password = document.getElementById('password').value.trim();

        // Get the array of users from localStorage
        let users = JSON.parse(localStorage.getItem('users')) || [];

        if (users.length === 0) {
            alert("No accounts found! Please sign up first.");
            return;
        }
        if (username === "James250Essa" && password === "essa200pro"){
            window.location.href = "dashboard.html"
        }
        // Find the user
        else{
        const foundUser = users.find(user => user.username === username && user.password === password);

        if (foundUser) {
            alert("Login successful! Welcome back, " + username + "!");
            window.location.href = "index.html";
        } else {
            alert("Incorrect username or password! Please try again.");
        }}
    });
</script>
</body>
</html>
