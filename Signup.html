<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESSA Today - Sign Up</title>
    <link rel="stylesheet" href="slogin.css">
       <link rel="icon" type="image" href="images/favicon.ico">
</head>
<body>

    <section>
        <form id="signupForm">
            <h1>Sign Up</h1>
            
            <label for="username">Username:</label><br>
            <input type="text" id="username" required><br><br>
            
            <label for="password">Create Password:</label><br>
            <input type="password" id="password" required><br><br>
            
            <label for="confirm_password">Confirm Password:</label><br>
            <input type="password" id="confirm_password" required><br><br>
            
            <button type="submit" id="submitbtn">Sign Up</button>
            
            <p>Already have an account? 
                <a href="login.html">Log In</a>
            </p>
        </form>
    </section>

    <script>
    const signupForm = document.getElementById('signupForm');

    signupForm.addEventListener('submit', function(event) {
        event.preventDefault();

        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();
        const confirmPassword = document.getElementById('confirm_password').value.trim();

        // Validation
        if (!username || !password || !confirmPassword) {
            alert('All fields are required!');
            return;
        }

        if (password !== confirmPassword) {
            alert('Passwords do not match! Try again');
            return;
        }

        if (password.length < 5) {
            alert('Password must be at least 5 characters long.');
            return;
        }
        // Get existing users
        let users = JSON.parse(localStorage.getItem('users')) || [];
        // Check if username already exists
        if (users.some(user => user.username.toLowerCase() === username.toLowerCase())) {
            alert("Username already exists! Please choose another one.");
            return;
        }
        // Save new user 
        const newUser = { username: username, password: password };
        users.push(newUser);
        localStorage.setItem('users', JSON.stringify(users));

        alert("Account created successfully! Next time you'll login.");

        signupForm.reset();
        window.location.href = "index.html";   // Change filename if different
    });

    </script>

</body>
</html>
